services:
  - type: web
    name: api-platform-gateway-fastapi-api
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: docker/api/Dockerfile
    preDeployCommand: alembic upgrade head
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: api-platform-gateway-fastapi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: api-platform-gateway-fastapi-redis
          property: connectionString

  - type: redis
    name: api-platform-gateway-fastapi-redis
    plan: free

databases:
  - name: api-platform-gateway-fastapi-db
    plan: free
    databaseName: app
    user: postgres

